services:
  mysql:
    image: mysql:8.0

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: animal_finder
      MYSQL_USER: animal_user
      MYSQL_PASSWORD: animal_pass

    ports:
      - "3307:3306"

    volumes:
      - animal_mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: animal_user
      DB_PASSWORD: animal_pass
      DB_NAME: animal_finder

    depends_on:
      - mysql

volumes:
  animal_mysql_data:
